# ============================================
# SONARQUBE CONFIGURATION - TFG VR Platform
# ============================================

# Información del proyecto
sonar.projectKey=tfg-vr-platform
sonar.projectName=TFG - Plataforma Clínica VR
sonar.projectVersion=1.0

# Directorios de código fuente
sonar.sources=app
sonar.tests=app/__tests__

# Archivos a incluir/excluir
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.config.ts,\
  **/*.config.js,\
  **/vite.config.ts

# Configuración de TypeScript/JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Lenguajes
sonar.language=ts,tsx,js,jsx

# Cobertura de código (si tienes tests)
# sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx

# Umbrales de calidad
sonar.qualitygate.wait=true
